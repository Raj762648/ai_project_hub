name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy FastAPI + Streamlit
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout Code
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v3

      # =========================
      # 2. Deploy via SSH
      # =========================
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "=============================="
            echo "🚀 Starting Deployment"
            echo "=============================="

            # Navigate to project
            cd ${{ secrets.EC2_APP_DIR }}

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "🐍 Activating virtual environment..."
            source venv/bin/activate

            echo "📦 Installing dependencies..."
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "🔄 Restarting backend service..."
            sudo systemctl restart ml-backend

            echo "🔄 Restarting frontend service..."
            sudo systemctl restart ml-frontend

            echo "⏳ Waiting for services to stabilize..."
            sleep 5

            echo "📊 Checking backend status..."
            sudo systemctl is-active --quiet ml-backend && echo "✅ Backend OK" || (echo "❌ Backend Failed" && sudo systemctl status ml-backend --no-pager && exit 1)

            echo "📊 Checking frontend status..."
            sudo systemctl is-active --quiet ml-frontend && echo "✅ Frontend OK" || (echo "❌ Frontend Failed" && sudo systemctl status ml-frontend --no-pager && exit 1)

            echo "🌐 Reloading Nginx..."
            sudo nginx -t
            sudo systemctl reload nginx

            echo "=============================="
            echo "🎉 Deployment Successful"
            echo "=============================="

